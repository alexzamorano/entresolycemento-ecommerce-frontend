<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - Entre Sol y Cemento</title>
    <link rel="icon" href="../ASSETS/IMG/logo/icologocolor.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../ASSETS/CSS/styles.css">
</head>
<body>
    <div class="background">
        <img src="../ASSETS/IMG/logo/logo_vectorial.svg" alt="Fondo">
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">Entre Sol y Cemento</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="../index.html">Inicio</a>
                    <a class="nav-link" href="catalogo.html">Catálogo</a>
                    <a class="nav-link" href="login.html">Ingresar</a>
                    <a class="nav-link active" href="register.html">Registrarse</a>
                    <a class="nav-link" href="carrito.html">Carrito&nbsp;<span class="badge bg-danger" id="cantidad-carrito">0</span></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <header class="p-4 mb-4 bg-hero rounded-3 text-white d-flex align-items-center shadow">
            <img src="../ASSETS/IMG/logo/logocolor192x192.png" alt="Logo" class="me-4 rounded-circle shadow-sm" style="width: 100px; height: 100px; object-fit: cover;">
            <div>
                <h1 class="h2 fw-bold text-white mb-1">Crear Cuenta</h1>
                <p class="mb-0 opacity-75">Únete a nuestra comunidad artesanal.</p>
            </div>
        </header>

        <main>
        <section class="py-4">
            <div class="formulario shadow-lg" style="max-width: 500px;">
                <div class="text-center mb-4">
                    <h2 class="text-danger fw-bold">Registro</h2>
                    <p>Crea tu cuenta y entra a tu espacio</p>
                </div>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" placeholder="Tu nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" placeholder="Repite tu contraseña" required>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" required id="terms">
                        <label class="form-check-label" for="terms">Acepto los términos y condiciones</label>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold shadow-sm">Crear cuenta</button>
                    <p class="text-center mt-3">¿Ya tienes cuenta? <a href="login.html" class="text-danger fw-bold">Inicia sesión</a></p>
                </form>
            </div>
        </section>
        </main>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        © 2026 Entre Sol y Cemento. Todos los derechos reservados.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ASSETS/JS/script.js"></script>
</body>
</html>
